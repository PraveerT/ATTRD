# Sanity: cn_xxl_canonical architecture (MotionCleanestLinXLQuatHead) but
# fed RAW NvidiaLoader pts (no AE canonicalization). This is identical to
# cn_xxl_quat_head except for the work_dir; reproducing 91.08 confirms the
# arch path itself is sound -- the canonical input was the bottleneck, not
# the model.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 100
work_dir: ./work_dir/cn_xxl_canonical_raw/
batch_size: 8
test_batch_size: 8
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 172
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  scheduler: constant_then_cosine
  cosine_start: 75
  num_epochs: 100
  optimizer: Adam
  base_lr: 0.00012
  step: [60, 70, 75]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_cleanest_quat_head.MotionCleanestLinXLQuatHead
model_args:
  pts_size: 172
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  lxl_hidden_dim: 256
  lxl_mlp_dim: 512
  lxl_num_layers: 4
  lxl_dropout: 0.3
  lxl_bidirectional: true
  lxl_residual_scale: 0.7
  quat_head_hidden: 128
  quat_head_scale: 0.3
