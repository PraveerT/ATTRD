# Additive branch-2 stage 1qm:
# - keep the EdgeConv baseline geometry intact
# - replace the post-EdgeConv pointwise mixer with a quaternion layer
# - merge quaternion groups before the pooled classifier

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/linear_branch_edgeconv_quatmerge_e120/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 1
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 96
dynamic_pts_size: True

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step: [80, 100, 110]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

model: models.reqnn_motion.EdgeConvQuaternionMergeMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  hidden_dims: [64, 128]
  dropout: 0.1
  edgeconv_k: 20
