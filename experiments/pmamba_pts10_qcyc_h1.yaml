# Variant H1: TRUE QCC — model outputs T-1 per-frame quats; aux loss has
# anchor (predict against target sequence) + cycle-consistency (compose →
# identity). Unfrozen, lr=1.2e-5, 60 ep starting at e101.

dataloader: nvidia_pts10_qccseq_loader.NvidiaPts10QccSeqLoader

phase: train
num_epoch: 160
work_dir: ./work_dir/pmamba_pts10_qcyc_h1/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false

weights: ./work_dir/pmamba_branch/epoch110_padded_stage1_22ch.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step:
  - 200
  weight_decay: 0.03
  start_epoch: 100
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion_qcch1.MotionQCCH1
model_args:
  pts_size: 256
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
  coord_channels: 4
  stage1_in_channels: 22
  num_transitions: 31
  predict_weight: 0.05
  cycle_weight: 0.5
