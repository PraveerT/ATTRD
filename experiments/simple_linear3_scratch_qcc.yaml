# Scratch 3-layer linear model with correspondence-cycle consistency.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 30
work_dir: ./work_dir/simple_linear3_scratch_qcc/
batch_size: 16
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 96
dynamic_pts_size: False

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step: [20, 26]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize
  return_correspondence: True
  bidirectional_correspondence: True

test_loader_args:
  phase: 'test'
  framerate: *framesize
  return_correspondence: False

model: models.reqnn_motion.SimpleLinearThreeLayerQCCMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  hidden_dims: [64, 128, 256]
  dropout: 0.1
  qcc_mode: correspondence_cycle
  qcc_weight: 0.05
  qcc_eps: 0.000001
