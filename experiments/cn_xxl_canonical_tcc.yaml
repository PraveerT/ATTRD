# TCC aux on canonical (AE-output) input, warm-start from v5 ep84 (79.46).
# Tests whether temporal-cycle-consistency regularization helps canonical
# (the model with most headroom + diverse errors).

dataloader: canonical_nvidia_loader.CanonicalNvidiaLoader
phase: train
num_epoch: 100
work_dir: ./work_dir/cn_xxl_canonical_tcc/
batch_size: 8
test_batch_size: 8
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 172
dynamic_pts_size: true
strict_load: false
weights: ./work_dir/cn_xxl_canonical_tcc/epoch75_model.pt

optimizer_args:
  scheduler: cosine
  cosine_start: 75
  num_epochs: 100
  optimizer: Adam
  base_lr: 0.00012
  step: [60, 70, 75]
  weight_decay: 0.03
  start_epoch: 75
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_cleanest_tcc.MotionCleanestLinXLQuatHeadTCC
model_args:
  pts_size: 172
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  lxl_hidden_dim: 256
  lxl_mlp_dim: 512
  lxl_num_layers: 4
  lxl_dropout: 0.3
  lxl_bidirectional: true
  lxl_residual_scale: 0.7
  quat_head_hidden: 128
  quat_head_scale: 0.3
  tcc_weight: 0.1
  tcc_lambda_log: 0.001
