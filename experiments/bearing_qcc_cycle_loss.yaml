# Bearing-quaternion QCC feature + grounded cycle consistency loss
# Continues from epoch 110 checkpoint with reconstruction + cycle aux loss

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_branch_qcc_loss/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: &framesize 32
pts_size: &frame_pts_size 96
dynamic_pts_size: True

weights: ./work_dir/quaternion_branch/epoch110_model.pt
strict_load: False

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step: [100, 120, 130]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize
  return_correspondence: False

test_loader_args:
  phase: 'test'
  framerate: *framesize
  return_correspondence: False

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  hidden_dims: [64, 256]
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 0.000001
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
