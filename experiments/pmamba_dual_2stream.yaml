# Two-stream: raw uvd-t (4-ch Motion) + lattice octo (6-ch Motion) fused.
# Each branch is a full Motion encoder; their 1024-d features concat → small
# MLP → logits. Goal: keep raw signal AND add corresponded lattice/velocity.

dataloader: nvidia_dual_loader.NvidiaDualLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_dual_2stream_v2/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false

weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 100
  - 160
  - 180
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.two_stream_motion.TwoStreamMotion
model_args:
  pts_size: 96
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
  hidden: 512
  dropout: 0.1
