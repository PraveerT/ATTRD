# REQNN-style spatial branch tuned closer to the original /notebooks/REQNN recipe.
# Branch 1 remains unchanged. This keeps the SHREC-style xyz loader, restores the
# point curriculum, and uses the original-style optimizer/regularization direction.

dataloader: nvidia_dataloader.NvidiaREQNNLoader

phase: train
num_epoch: 240
work_dir: ./work_dir/reqnn_motion_xyz_reqnnstyle/
batch_size: 4
test_batch_size: 1
num_worker: 8

device: 1
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 256
dynamic_pts_size: True

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

optimizer_args:
  optimizer: SGD
  base_lr: 0.01
  step: [120, 180, 220]
  weight_decay: 0.0001
  start_epoch: 0
  nesterov: False

model: models.reqnn_motion.REQNNMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  reqnn_k: 20
  reqnn_emb_dims: 1024
  temporal_hidden: 512
  dropout: 0.5
  sample_mode: uniform
