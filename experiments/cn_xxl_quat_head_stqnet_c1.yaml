# ST-QNet-C1 mechanism on RAW (no correspondence) cnxxlquat input.
# Time-stable alpha for cluster correspondence across frames (canonical's
# input correspondence isn't there to anchor clusters implicitly).
# K=6 (palm + 5 fingers), lambda_cycle=0.05 (winning settings on canonical).
# From-scratch training.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 100
work_dir: ./work_dir/cn_xxl_quat_head_stqnet_c1/
batch_size: 8
test_batch_size: 8
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 172
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  scheduler: constant_then_cosine
  cosine_start: 75
  num_epochs: 100
  optimizer: Adam
  base_lr: 0.00012
  step: [60, 70, 75]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_cleanest_stqnet_c1.MotionCleanestLinXLSTQNetC1
model_args:
  pts_size: 172
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  lxl_hidden_dim: 256
  lxl_mlp_dim: 512
  lxl_num_layers: 4
  lxl_dropout: 0.3
  lxl_bidirectional: true
  lxl_residual_scale: 0.7
  quat_head_hidden: 128
  quat_head_scale: 0.3
  K: 6
  lambda_cycle: 0.05
  lambda_recon: 0.025
  lambda_balance: 0.01
  cluster_feat_dim: 256
  cluster_hidden: 64
  cluster_alpha_mode: time_stable
