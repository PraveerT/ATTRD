# Standalone REQNN-based second branch.
# This branch encodes each frame independently with intra-frame kNN,
# then aggregates frame descriptors over time. It does not rely on
# point-to-point correspondence across frames.

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 300
work_dir: ./work_dir/reqnn_motion/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 1
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 96

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

model: models.reqnn_motion.REQNNMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  reqnn_k: 20
  reqnn_emb_dims: 256
  temporal_hidden: 256
  dropout: 0.3
