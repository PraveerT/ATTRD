# RD ramp 48->92 over 20 epochs (slope 2.2/ep), then hold at 92 with LR x0.1 for 10 ep.
# 30 epochs total. LR step at 20.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 30
work_dir: ./work_dir/pmamba_rd_ramp20_hold92/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
pts_ramp_target: 92
pts_ramp_epochs: 20
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [20]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_realdeltanet.MotionRealDeltaNet
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  rd_hidden_dim: 128
  rd_num_layers: 2
  rd_num_heads: 4
  rd_n_q: 4
  rd_n_v: 8
  rd_dropout: 0.3
  rd_bidirectional: true
