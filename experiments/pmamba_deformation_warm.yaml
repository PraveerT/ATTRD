# Net7w (warm@dtw_qcc/ep100 + deformation input, ep100->120): same recipe as 90.04 baseline, swap dataloader.
# Strips gesture-speed style variation by re-sampling frames to equal motion budget.

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_deformation_warm/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: work_dir/pmamba_dtw_qcc/epoch100_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 100
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

dataloader: nvidia_dataloader.NvidiaDeformationLoader
model: models.motion.Motion
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
