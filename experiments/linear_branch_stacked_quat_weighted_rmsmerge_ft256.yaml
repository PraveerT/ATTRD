# Additive branch-2 fine-tune trial:
# - start from the strong stacked weighted-RMS checkpoint
# - train only at pts_size 256 with a fresh low learning rate

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 60
work_dir: ./work_dir/linear_branch_edgeconv_quatstack_weighted_rms_ft256_from110_e60/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 1
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 256
dynamic_pts_size: False

optimizer_args:
  optimizer: Adam
  base_lr: 0.00005
  step: [20, 40, 50]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

model: models.reqnn_motion.EdgeConvQuaternionStackedWeightedRMSMergeMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  hidden_dims: [64, 256]
  dropout: 0.1
  edgeconv_k: 20
  merge_eps: 0.000001
