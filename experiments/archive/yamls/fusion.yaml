# Learned fusion: PMamba + Quaternion (grounded cycle consistency) branches
# Concat fusion with auxiliary branch losses + cosine annealing
dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 250
work_dir: ./work_dir/fusion_branch/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: &framesize 32
pts_size: 256
dynamic_pts_size: False

# Branch weights loaded via prefix remapping
temporal_weights: ./work_dir/pmamba_branch/epoch110_model.pt
temporal_source_prefix: ''
temporal_target_prefix: temporal_branch

spatial_weights: ./work_dir/quaternion_branch/epoch112_model.pt
spatial_source_prefix: ''
spatial_target_prefix: spatial_branch

freeze: null
strict_load: False

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  fusion_lr_mult: 25.0
  temporal_prefix: temporal_branch
  scheduler: cosine
  num_epochs: 250
  step: [200, 230, 245]
  weight_decay: 0.02
  start_epoch: 120
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

model: models.fusion.MotionDualBranchFusion
model_args:
  pts_size: 256
  num_classes: 25
  temporal_model_args:
    knn: [32, 24, 48, 24]
    topk: 8
  spatial_model_args:
    hidden_dims: [64, 256]
    dropout: 0.05
    edgeconv_k: 20
    merge_eps: 0.000001
    so3_weight: 0.0
    rotation_sigma: 0.3
    bearing_knn_k: 10
    qcc_weight: 0.1
  fusion_dim: 256
  dropout: 0.25
  aux_weight: 0.3
