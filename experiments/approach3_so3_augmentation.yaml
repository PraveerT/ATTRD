# Approach 3: SO(3) augmentation equivariance
# Fine-tune from epoch110 checkpoint with rotation equivariance loss
# No correspondences needed - uses standard loader

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/approach3_so3_augmentation/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 96
dynamic_pts_size: True

weights: ./work_dir/quaternion_branch/epoch110_model.pt
strict_load: False

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step: [80, 100, 110]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

model: models.reqnn_motion.SO3AugEquivarianceMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  hidden_dims: [64, 256]
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 0.000001
  aux_weight: 0.01
  rotation_sigma: 0.3
