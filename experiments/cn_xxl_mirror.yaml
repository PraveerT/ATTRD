# CNXXL from-scratch + horizontal mirror-aug. Identical recipe to the 91.29 run,
# only change = train loader does x-mirror (det -1, not reachable by the existing
# rotation augmentor). Compare final test acc to the 91.29 baseline.
alpha: 0.7
batch_size: 8
dataloader: nvidia_dataloader_mirror.NvidiaLoaderMirror
device: 0
dynamic_pts_size: true
eval_interval: 1
framesize: 32
freeze: null
ignore_weights: []
log_interval: 50
min_best_acc: 91.0
model: models.motion_cleanest_quat_head.MotionCleanestLinXLQuatHead
model_args:
  knn: [32, 24, 48, 24]
  lxl_bidirectional: true
  lxl_dropout: 0.3
  lxl_hidden_dim: 256
  lxl_mlp_dim: 512
  lxl_num_layers: 4
  lxl_residual_scale: 0.7
  multi_scale_num_scales: 5
  num_classes: 25
  pts_size: 172
  topk: 8
num_epoch: 150
num_worker: 8
optimizer_args:
  base_lr: 0.00012
  cosine_start: 75
  eta_min_ratio: 0.01
  lock_start: 100
  nesterov: false
  num_epochs: 150
  optimizer: Adam
  scheduler: constant_then_cosine_then_lock
  start_epoch: 0
  step: [60, 70, 75]
  weight_decay: 0.03
phase: train
print_log: true
pts_size: 172
random_fix: true
random_seed: 0
resume: false
save_interval: 200
strict_load: false
temperature: 3.0
test_batch_size: 8
test_loader_args:
  framerate: 32
  phase: test
  aug_mirror: false
train_loader_args:
  framerate: 32
  phase: train
  aug_mirror: true
  mirror_prob: 0.5
use_soft_labels: false
weights: null
work_dir: ./work_dir/cn_xxl_mirror/
