# RD pts=48 fixed throughout, 120 epochs. LR drop at ep 100.
# eval every 10 until ep 100, then every 1 (original main.py behavior).

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_rd_pts48_120ep/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 10
save_interval: 5

framesize: 32
pts_size: 48
dynamic_pts_size: false
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_realdeltanet.MotionRealDeltaNet
model_args:
  pts_size: 48
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  rd_hidden_dim: 128
  rd_num_layers: 2
  rd_num_heads: 4
  rd_n_q: 4
  rd_n_v: 8
  rd_dropout: 0.3
  rd_bidirectional: true
