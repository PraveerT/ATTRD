# BD-N on NVGesture with buf=2. Same protocol as pmamba_baseline_bdn.yaml
# but with the smaller buffer that matches MQAR's "buffer < KV count" regime
# (which forced delta-state usage and proved the hybrid mechanism is real).
#
# At T~4-8 post-pooling, buf=2 lets the buffer hold the 2 most recent tokens
# and ejects everything older into the delta state. This is the closest analog
# to MQAR's T=128 buf=16 setup where BD-N still won by +3.30pp.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_baseline_bdn_buf2/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_bdn.MotionBDelta
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  bdn_hidden_dim: 128
  bdn_num_layers: 2
  bdn_num_heads: 4
  bdn_head_dim: 32
  bdn_buffer_size: 2
  bdn_dropout: 0.3
  bdn_bidirectional: true
