# Option A: stage1 takes all 10 channels (raw uvd-t + nearest-lattice octo);
# everything downstream (KNN, position_diff, MotionBlock embedding, multi_scale,
# stage5) uses only the first 4 (raw uvd-t). Lattice + velocity info gets
# baked into the per-point embedding once at the input layer, then carried
# through the unchanged baseline backbone.

dataloader: nvidia_pts10_loader.NvidiaPts10Loader

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_pts10_optA_v2/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false

weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 100
  - 160
  - 180
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.Motion
model_args:
  pts_size: 96
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
  coord_channels: 4
  stage1_in_channels: 10
