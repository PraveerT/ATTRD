# Variant D: pts10 + per-sample 12-dim cycle-product (Q_raw_cycle,
# Q_lat_cycle, Q_combined_cycle) broadcast as 12 extra channels.
# stage1_in_channels = 22.

dataloader: nvidia_pts10_qcycprod_loader.NvidiaPts10QcycprodLoader

phase: train
num_epoch: 30
work_dir: ./work_dir/pmamba_pts10_qcyc_d/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false

weights: ./work_dir/pmamba_branch/epoch110_padded_stage1_22ch.pt
freeze: backbone

optimizer_args:
  optimizer: Adam
  base_lr: 0.0001
  step:
  - 20
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.Motion
model_args:
  pts_size: 256
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
  coord_channels: 4
  stage1_in_channels: 22
