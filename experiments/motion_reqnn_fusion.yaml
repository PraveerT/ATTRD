# Two-branch fusion fine-tuning model:
# - temporal_branch: Motion
# - spatial_branch: EdgeConvQuaternionWeightedRMSMergeMotion
#
# Fine-tuning from the current standalone winners with continuation-style epoch numbering:
# python main.py --config motion_reqnn_fusion.yaml \
#   --work-dir ./work_dir/motion_weighted_rms_fusion_e240_ft \
#   --temporal-weights ./work_dir/motion_e120/epoch110_model.pt \
#   --spatial-weights ./work_dir/linear_branch_edgeconv_quatmerge_weighted_rms_h256_e120/epoch110_model.pt

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 240
work_dir: ./work_dir/motion_weighted_rms_fusion_e240_ft/
batch_size: 4
test_batch_size: 1
num_worker: 4


device: 1
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 256
dynamic_pts_size: False

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 120
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

model: models.reqnn_motion.MotionREQNNFusion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  spatial_hidden_dims: [64, 256]
  spatial_edgeconv_k: 20
  spatial_merge_eps: 0.000001
  spatial_dropout: 0.1
  fusion_hidden: 512
  fusion_dropout: 0.3
