# Additive branch-2 current trial:
# - keep the h256 weighted-RMS quaternion-merge winner structure
# - only add an Orkis-style quaternion similarity rotation before weighted RMS collapse

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/linear_branch_edgeconv_quatmerge_weighted_similarity_rot_rms_h256_e120/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 1
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 96
dynamic_pts_size: True

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step: [80, 100, 110]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

model: models.reqnn_motion.EdgeConvQuaternionSimilarityRotatedWeightedRMSMergeMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  hidden_dims: [64, 256]
  dropout: 0.1
  edgeconv_k: 20
  merge_eps: 0.000001
