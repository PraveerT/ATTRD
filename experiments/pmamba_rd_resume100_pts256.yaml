# Resume from pts=32 ep100 checkpoint, switch to pts=256 fixed, train 40 more ep.
# Tests whether a low-pts-trained model can recover to baseline acc by switching to high pts.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_rd_resume100_pts256/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false
weights: ./work_dir/pmamba_rd_pts32_120ep/epoch100_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step: []
  weight_decay: 0.03
  start_epoch: 100
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_realdeltanet.MotionRealDeltaNet
model_args:
  pts_size: 256
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  rd_hidden_dim: 128
  rd_num_layers: 2
  rd_num_heads: 4
  rd_n_q: 4
  rd_n_v: 8
  rd_dropout: 0.3
  rd_bidirectional: true
