# REQNN-based spatial branch trained on SHREC-style xyz geometry.
# Branch 1 remains unchanged and continues to use the original loader/model path.

dataloader: nvidia_dataloader.NvidiaREQNNLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/reqnn_motion_xyz/
batch_size: 4
test_batch_size: 1
num_worker: 4

device: 1
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: &framesize 32
pts_size: &frame_pts_size 256
dynamic_pts_size: True

train_loader_args:
  phase: 'train'
  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: False

model: models.reqnn_motion.REQNNMotion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  reqnn_k: 20
  reqnn_emb_dims: 256
  temporal_hidden: 256
  dropout: 0.3
  sample_mode: uniform
