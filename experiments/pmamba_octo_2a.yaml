# Option 2a: drop-in replacement of raw uvd-t with octo (x, y, z, vx, vy, vz)
# Trains Motion from scratch on corresponded lattice + real velocity input.
# Baseline (raw uvd-t, 4-channel input): 89.83 on NVGesture test.
# Goal: same arch, swap input channels — measure delta.

dataloader: nvidia_octo_loader.NvidiaOctoLoader

phase: train
num_epoch: 80
work_dir: ./work_dir/pmamba_octo_2a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false

# train fresh (input dim 4 → 6, no compatible pretrained weights)
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.0008
  step:
  - 60
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.Motion
model_args:
  pts_size: 256
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
  coord_channels: 6
