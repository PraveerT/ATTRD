<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Anemon">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Anemon</title>
<style>
  :root {
    --bg: #0a0a0a; --fg: #e8e8e8; --dim: #888; --accent: #6bf; --warn: #fb6; --good: #6f9; --bad: #f66;
    --panel: #141414; --line: #252525;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 13px/1.45 ui-monospace, 'SF Mono', Menlo, Consolas, monospace; min-height: 100vh; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  header { padding: 14px 16px 6px; display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  h1 { font: 600 16px/1 inherit; margin: 0; letter-spacing: 0.5px; }
  .ago { font-size: 11px; color: var(--dim); }
  .ago.stale { color: var(--warn); }
  section { padding: 8px 16px; border-top: 1px solid var(--line); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .kv { display: flex; flex-direction: column; min-width: 70px; }
  .kv .k { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.6px; }
  .kv .v { font-size: 14px; font-weight: 600; }
  .v.good { color: var(--good); }
  .v.bad { color: var(--bad); }
  .run { color: var(--accent); font-weight: 600; word-break: break-all; }
  .bar { background: var(--panel); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 3px; }
  .bar > i { display: block; height: 100%; background: var(--accent); transition: width 0.3s; }
  .bar.warn > i { background: var(--warn); }
  .bar.bad  > i { background: var(--bad); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 4px 6px; text-align: right; }
  th { color: var(--dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; font-size: 10px; border-bottom: 1px solid var(--line); }
  td:first-child, th:first-child { text-align: left; }
  tr.best td { color: var(--good); font-weight: 700; }
  .footer { padding: 10px 16px 20px; color: var(--dim); font-size: 11px; text-align: center; }
  .err { color: var(--bad); }
</style>
</head>
<body>
<header>
  <h1>ANEMON · <span id="run">—</span></h1>
  <span class="ago" id="ago">…</span>
</header>

<section id="now-sec">
  <div class="row">
    <div class="kv"><span class="k">epoch</span><span class="v" id="now-ep">—</span></div>
    <div class="kv"><span class="k">batch</span><span class="v" id="now-batch">—</span></div>
    <div class="kv"><span class="k">best p1</span><span class="v good" id="best">—</span></div>
    <div class="kv"><span class="k">last p1</span><span class="v" id="last-p1">—</span></div>
    <div class="kv"><span class="k">last p5</span><span class="v" id="last-p5">—</span></div>
  </div>
</section>

<section>
  <div class="row">
    <div class="kv" style="flex:1; min-width: 160px;">
      <span class="k">gpu mem</span><span class="v" id="gpu-txt">—</span>
      <div class="bar"><i id="gpu-bar" style="width:0%"></i></div>
    </div>
    <div class="kv" style="flex:1; min-width: 130px;">
      <span class="k">gpu util</span><span class="v" id="gpu-util">—</span>
      <div class="bar"><i id="util-bar" style="width:0%"></i></div>
    </div>
  </div>
  <div class="row" style="margin-top: 10px;">
    <div class="kv" style="flex:1; min-width: 160px;">
      <span class="k">ram</span><span class="v" id="ram-txt">—</span>
      <div class="bar"><i id="ram-bar" style="width:0%"></i></div>
    </div>
    <div class="kv" style="flex:1; min-width: 130px;">
      <span class="k">disk</span><span class="v" id="disk-txt">—</span>
      <div class="bar"><i id="disk-bar" style="width:0%"></i></div>
    </div>
  </div>
</section>

<section>
  <table>
    <thead><tr><th>ep</th><th>tr%</th><th>loss</th><th>te p1</th><th>te p5</th></tr></thead>
    <tbody id="epochs"></tbody>
  </table>
</section>

<div class="footer" id="footer">connecting…</div>

<script src="/app.js"></script>
</body>
</html>
